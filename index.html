<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>销售库存系统 Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="loginScreen" class="login-screen">
      <div class="login-card">
        <div class="login-brand">
          <span>销</span>
          <div>
            <strong>销售库存系统</strong>
            <p>登录后进入工作台</p>
          </div>
        </div>
        <form id="loginForm">
          <label>
            <span>账号</span>
            <input name="username" placeholder="请输入账号" autocomplete="username" required />
          </label>
          <label>
            <span>密码</span>
            <input name="password" type="password" placeholder="请输入密码" autocomplete="current-password" required />
          </label>
          <label class="remember-line">
            <input name="remember" type="checkbox" />
            <span>记住密码</span>
          </label>
          <p id="loginError" class="login-error"></p>
          <button class="primary-button" type="submit">登录系统</button>
        </form>
      </div>
    </section>

    <div class="app-shell hidden">
      <aside class="sidebar" aria-label="系统导航">
        <div class="sidebar-brand">
          <span>销</span>
          <strong>销售管理</strong>
        </div>
        <nav class="side-nav">
          <div class="side-section sales-nav-section" id="salesNavSection">
            <button class="side-section-title side-action" id="salesMenuToggle" type="button" aria-expanded="false">
              <span class="side-icon">销</span>
              <span>销售管理</span>
              <span class="side-chevron">›</span>
            </button>
            <div class="view-tabs collapsed" id="salesMenuPanel" aria-label="销售管理切换">
              <button class="view-tab" data-view="sales" type="button">销售</button>
              <button class="view-tab active" data-view="stock" type="button">库存</button>
            </div>
          </div>
          <div class="side-section">
            <button id="addUserButton" class="side-section-title side-action" type="button">
              <span class="side-icon">权</span>
              <span>用户管理</span>
            </button>
          </div>
        </nav>
        <button id="logoutButton" class="sidebar-logout" type="button">退出登录</button>
      </aside>
      <main class="workspace">
        <header class="topbar">
          <div class="actions">
            <span id="currentUserLabel" class="user-badge">未登录</span>
            <button id="resetButton" class="ghost-button" type="button">刷新</button>
            <input id="importInput" type="file" accept=".csv,text/csv" hidden />
            <button id="importButton" class="ghost-button" type="button">导入</button>
            <button id="exportButton" class="ghost-button" type="button">导出</button>
            <button id="addStockButton" class="primary-button compact" type="button">新增库存</button>
          </div>
        </header>

        <section class="metrics" aria-label="销售统计">
          <article data-metric="stock">
            <span>库存件数</span>
            <strong id="stockCount">0</strong>
          </article>
          <article data-metric="stock">
            <span>库存金额</span>
            <strong id="stockAmount">¥0</strong>
          </article>
          <article data-metric="sales">
            <span>已售件数</span>
            <strong id="soldCount">0</strong>
          </article>
          <article data-metric="sales">
            <span>销售额</span>
            <strong id="salesTotal">¥0</strong>
          </article>
          <article data-metric="sales">
            <span>利润</span>
            <strong id="profitTotal">¥0</strong>
          </article>
        </section>

        <section class="table-zone">
          <div class="table-toolbar">
            <div>
              <strong>商品明细</strong>
              <span id="resultCount">0 条记录</span>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>型号</th>
                  <th>款式</th>
                  <th>VSN</th>
                  <th>库存仓库</th>
                  <th>原价</th>
                  <th>成本</th>
                  <th>售卖</th>
                  <th>售卖价</th>
                  <th>利润</th>
                  <th>销售员</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <dialog id="userDialog">
      <form id="userForm">
        <div class="dialog-head">
          <strong>用户管理</strong>
          <button data-action="close-user-dialog" type="button" aria-label="关闭">×</button>
        </div>
        <section class="user-manager">
          <div class="section-title">
            <span>人员列表</span>
            <small id="userCount">0 人</small>
          </div>
          <div class="user-list" id="userList"></div>
        </section>
        <section class="user-manager add-user-panel">
          <div class="section-title">
            <span>新增用户</span>
          </div>
        <label>
          <span>账号</span>
          <input name="username" placeholder="请输入登录账号" required />
        </label>
        <label>
          <span>密码</span>
          <input name="password" type="password" placeholder="请输入登录密码" required />
        </label>
        <label>
          <span>角色</span>
          <select name="role" required>
            <option value="manager">主管</option>
            <option value="employee">员工</option>
            <option value="super_admin">超级管理员</option>
          </select>
        </label>
        <div class="permission-list">
          <div class="section-title compact-title">
            <span>新用户权限</span>
          </div>
          <div id="newUserPermissions" class="permission-grid"></div>
        </div>
        <div class="permission-list default-permissions">
          <div class="section-title compact-title">
            <span>默认角色权限</span>
          </div>
          <div class="role-permission-block">
            <strong>主管</strong>
            <div id="managerPermissions" class="permission-grid"></div>
          </div>
          <div class="role-permission-block">
            <strong>员工</strong>
            <div id="employeePermissions" class="permission-grid"></div>
          </div>
        </div>
        </section>
        <div class="dialog-actions">
          <button class="ghost-button" data-action="close-user-dialog" type="button">取消</button>
          <button class="primary-button compact" type="submit">保存用户</button>
        </div>
      </form>
    </dialog>

    <dialog id="stockDialog">
      <form id="itemForm">
        <div class="dialog-head">
          <strong>新增库存</strong>
          <button data-action="close-stock-dialog" type="button" aria-label="关闭">×</button>
        </div>
        <label>
          <span>日期</span>
          <input name="date" type="date" value="2026-07-05" required />
        </label>
        <label>
          <span>型号</span>
          <input name="model" placeholder="例如 AQ" required />
        </label>
        <label>
          <span>款式</span>
          <input name="style" placeholder="例如 白刚红色小牛皮" required />
        </label>
        <label>
          <span>VSN</span>
          <input name="vsn" placeholder="例如 23009799" required />
        </label>
        <label>
          <span>库存仓库</span>
          <select name="warehouse" required>
            <option value="成都">成都</option>
            <option value="贵阳">贵阳</option>
          </select>
        </label>
        <div class="form-grid">
          <label>
            <span>原价</span>
            <input name="price" type="number" min="0" step="0.1" required />
          </label>
          <label>
            <span>成本</span>
            <input name="cost" type="number" min="0" step="0.1" required />
          </label>
        </div>
        <div class="form-grid sales-only-field">
          <label>
            <span>售卖价</span>
            <input name="salePrice" type="number" min="0" step="0.1" />
          </label>
          <label>
            <span>销售员</span>
            <input name="seller" placeholder="请输入销售员" />
          </label>
        </div>
        <div class="dialog-actions">
          <button class="ghost-button" data-action="close-stock-dialog" type="button">取消</button>
          <button class="primary-button compact" id="stockSubmitButton" type="submit">添加到库存</button>
        </div>
      </form>
    </dialog>

    <dialog id="saleDialog">
      <form method="dialog" id="saleForm">
        <div class="dialog-head">
          <strong>登记售卖</strong>
          <button data-action="close-sale-dialog" type="button" aria-label="关闭">×</button>
        </div>
        <input type="hidden" name="id" />
        <label>
          <span>售卖价</span>
          <input name="salePrice" type="number" min="0" step="0.1" required />
        </label>
        <label>
          <span>销售员</span>
          <input name="seller" placeholder="请输入销售员" required />
        </label>
        <div class="dialog-actions">
          <button class="ghost-button" data-action="close-sale-dialog" type="button">取消</button>
          <button class="primary-button compact" value="confirm" type="submit">确认售卖</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
